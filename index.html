<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESS 能源管理系統 - Taiwan Microgrid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #f1f5f9;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; min-height: 100vh; }
    .header { display: flex; align-items: center; justify-content: center; padding: 20px 0; gap: 10px; }
    .logo { color: #136dec; }
    .title { font-size: 20px; font-weight: bold; }
    .card { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #334155; background: rgba(15, 23, 42, 0.6); color: white; font-size: 16px; margin-bottom: 12px; }
    .btn { width: 100%; padding: 16px; background: #136dec; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .hero { background: linear-gradient(135deg, #1e3a5f, #0f172a); border-radius: 16px; padding: 40px 24px; margin-bottom: 24px; text-align: center; }
    .hero h2 { font-size: 28px; margin-bottom: 8px; }
    .hero p { color: #94a3b8; }
    .label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a; border-top: 1px solid #1e293b; padding: 12px 20px 24px; display: flex; justify-content: space-around; max-width: 480px; margin: 0 auto; }
    .nav-item { text-align: center; color: #64748b; font-size: 10px; }
    .nav-item.active { color: #136dec; }
    .nav-icon { width: 24px; height: 24px; margin: 0 auto 4px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .text-primary { color: #136dec; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; background: rgba(19,109,236,0.1); color: #136dec; }
    .badge-success { background: rgba(16,185,129,0.1); color: #10b981; }
    .badge-warning { background: rgba(245,158,11,0.1); color: #f59e0b; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
